name: dbt CI

on:
  push:
    paths:
      - 'dbt/**'
  pull_request:
    paths:
      - 'dbt/**'

jobs:
  dbt-compile:
    runs-on: ubuntu-latest
    
    # A MÁGICA: Sobe um banco Postgres vazio e descartável na porta 5432
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dbt
        run: pip install dbt-core==1.11.12 dbt-postgres==1.10.2

      - name: Criar profiles.yml mínimo para CI
        run: |
          mkdir -p ~/.dbt
          cat > ~/.dbt/profiles.yml << 'EOF'
          pipeline_bcb:
            target: ci
            outputs:
              ci:
                type: postgres
                host: localhost
                port: 5432
                user: ci
                password: ci
                dbname: ci
                schema: staging
                threads: 1
          EOF

      - name: dbt compile
        working-directory: dbt/pipeline_bcb
        run: dbt compile